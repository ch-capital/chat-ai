<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>AI 聊天</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 10px;
      background: #f5f5f5;
    }

    h2 {
      text-align: center;
    }

    #chat {
      background: #fff;
      border-radius: 10px;
      padding: 15px;
      height: 400px;
      overflow-y: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .msg {
      margin: 10px 0;
      line-height: 1.5;
    }

    .user {
      text-align: right;
      color: #007aff;
    }

    .bot {
      text-align: left;
      color: #333;
    }

    #inputArea {
      display: flex;
      margin-top: 10px;
    }

    #input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background: #007aff;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #005ecb;
    }
  </style>
</head>

<body>

<h2>🤖 AI 聊天</h2>

<div id="chat"></div>

<div id="inputArea">
  <input id="input" placeholder="输入消息..." />
  <button onclick="send()">发送</button>
</div>

<script>
let messages = [];

function addMessage(text, className) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg " + className;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function send() {
  const input = document.getElementById("input");
  const message = input.value.trim();
  if (!message) return;

  addMessage("你：" + message, "user");
  input.value = "";

  messages.push({ role: "user", content: message });

  // loading
  const loadingDiv = addMessage("AI 正在思考...", "bot");

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ messages })
    });

    const data = await res.json();

    loadingDiv.textContent = "AI：" + (data.reply || "出错了");

    // 保存AI回复
    messages.push({
      role: "assistant",
      content: data.reply
    });

  } catch (err) {
    loadingDiv.textContent = "⚠️ 请求失败";
  }
}
</script>

</body>
</html>
